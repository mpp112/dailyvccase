name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-dailyvccase-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            REPO="git@github.com:${{ github.repository }}.git"
            IMAGE="dailyvccase-vc-research:latest"

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            if [ ! -d .git ]; then
              git clone "$REPO" .
            else
              git fetch origin main
              git reset --hard origin/main
            fi

            cd vc_research_starter
            cp -n .env.example .env || true
            mkdir -p data/raw data/normalized data/output
            docker build -t "$IMAGE" .
            docker run --rm --user "$(id -u):$(id -g)" --env-file .env -v "$PWD/data:/app/data" "$IMAGE" vc-research init-db
            docker run --rm --user "$(id -u):$(id -g)" --env-file .env -v "$PWD/data:/app/data" "$IMAGE" python -m pytest
            docker image prune -f

